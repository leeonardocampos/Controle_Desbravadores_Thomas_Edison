<title>Thomas Edison</title>
<style>
:root{--am:#FFC400;--pr:#0a0a0a;--card:#141414;--ln:#222;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--pr);color:#fff;font-family:'Trebuchet MS','Segoe UI',sans-serif;}
.wrap{max-width:640px;margin:0 auto;padding:18px 14px 60px;}
.topo{border-bottom:3px solid var(--am);padding-bottom:12px;margin-bottom:16px;}
.kicker{font-size:11px;letter-spacing:2px;color:var(--am);font-weight:700;}
.titulo{font-size:22px;font-weight:800;line-height:1.1;}
.quem{font-size:13px;color:#999;margin-top:4px;}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.pill{border:none;cursor:pointer;border-radius:999px;padding:8px 14px;font-weight:700;font-size:14px;background:#1c1c1c;color:#888;}
.pill.on{background:var(--am);color:#000;}
input[type=date]{background:#141414;border:1px solid var(--ln);color:#fff;border-radius:10px;padding:8px 10px;font-size:14px;}
.hint{font-size:11px;color:#666;margin-bottom:16px;}
.card{background:var(--card);border:1px solid var(--ln);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-top{display:flex;gap:12px;align-items:flex-start;}
.nome{width:96px;flex-shrink:0;}
.nome b{font-size:15px;line-height:1.2;display:block;}
.tag{font-size:10px;background:var(--am);color:#000;padding:2px 6px;border-radius:6px;font-weight:800;}
.rmv{background:none;border:none;color:#e55;cursor:pointer;font-size:18px;line-height:1;padding:0;margin-left:6px;}
.checks{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.chk{cursor:pointer;border-radius:10px;padding:9px 4px;font-size:12px;font-weight:700;border:2px solid #2a2a2a;background:transparent;color:#777;}
.chk.on{border-color:var(--am);background:rgba(255,196,0,.15);color:var(--am);}
.just{margin-top:10px;width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#ddd;font-size:13px;}
.addrow{display:flex;gap:8px;margin:6px 0 22px;}
.addrow input{flex:1;background:var(--card);border:1px solid #2a2a2a;border-radius:10px;padding:11px 12px;color:#fff;font-size:14px;}
.addbtn{background:#1c1c1c;color:var(--am);border:1px solid var(--am);border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer;}
.stats{display:flex;gap:10px;margin-bottom:16px;}
.stat{flex:1;background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:14px 8px;text-align:center;}
.stat .n{font-size:28px;font-weight:800;color:var(--am);}
.stat .l{font-size:11px;color:#888;}
.enviar{width:100%;background:var(--am);color:#000;border:none;border-radius:12px;padding:15px;font-weight:800;font-size:16px;cursor:pointer;}
.enviar:disabled{opacity:.5;}
.aviso{background:#2d2000;border:1px solid var(--am);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--am);}
.result{margin-top:20px;background:#0d1f12;border:1px solid #1f5132;border-radius:14px;padding:16px;}
.result h4{margin:0 0 10px;font-size:12px;color:#4ade80;}
.bolha{background:#075e54;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;white-space:pre-line;}
.acoes{display:flex;gap:8px;margin-top:10px;}
.acoes a{flex:1;text-align:center;text-decoration:none;border-radius:10px;padding:11px;font-weight:700;font-size:14px;background:#25d366;color:#06310f;}
.ptable{width:100%;border-collapse:collapse;margin-top:8px;}
.ptable th,.ptable td{border:1px solid var(--ln);padding:8px;font-size:13px;text-align:center;}
.ptable th{background:#111;color:var(--am);}
.load{color:#888;padding:20px;text-align:center;}
</style>
</head>

function esc(t){return String(t).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function pad(n){return n<10?'0'+n:String(n);}
function hoje(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function erroTela(msg){$('app').innerHTML='<div style="color:#e88;padding:20px;font-size:13px;line-height:1.6">'+msg+'<br><br><a href="javascript:location.reload()" style="color:#FFC400">⟳ Recarregar</a></div>';}

// ── chamada ao servidor via fetch() ──────────────────────────────────────────
// Funciona tanto dentro do GAS (google.script.run) quanto de fora (fetch)
function callAPI(action, params, onSuccess, onFailure) {
  var body = JSON.stringify(Object.assign({action: action, token: TOKEN}, params || {}));
  fetch(GAS_URL, {method: 'POST', body: body})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d){
      if(d.ok) onSuccess(d.data);
      else onFailure(new Error(d.error || 'Erro desconhecido'));
    })
    .catch(function(e){ onFailure(e); });
}

// ── token e estado ────────────────────────────────────────────────────────────
var TOKEN=(typeof _TK!=='undefined'&&_TK)?_TK:((location.search.match(/[?&]k=([^&]*)/)||[])[1]||'');
var CTX=null;
var COLS=[['presenca','Presença'],['pontualidade','Pontualidade'],['biblia','Bíblia'],['camiseta','Camiseta'],['classe','Classe']];
var state={unit:null,date:hoje(),rows:[],jaSalvo:false,view:'controle'};

// ── cabeçalho ─────────────────────────────────────────────────────────────────
function header(){
  var logo=(LOGOS&&LOGOS.clube)?'<img src="'+LOGOS.clube+'" style="height:52px;flex-shrink:0;">':'';
  var dt='<input type="date" id="dt" value="'+state.date+'">';
  var pills='';
  if(CTX&&CTX.units&&CTX.units.length>1){
    pills=CTX.units.map(function(u){
      var on=u===state.unit?' on':'';
      return '<button class="pill'+on+'" onclick="pickUnit(this.dataset.u)" data-u="'+esc(u)+'">'+esc(u)+'</button>';
    }).join('');
  }
  var painel='';
  if(CTX&&CTX.role==='admin'){
    painel='<button class="pill'+(state.view==='painel'?' on':'')+'" onclick="togglePainel()">📊 Painel</button>';
  }
  return '<div class="topo"><div style="display:flex;align-items:center;gap:10px">'+logo
    +'<div><div class="kicker">CLUBE DE DESBRAVADORES</div>'
    +'<div class="titulo">THOMAS EDISON 💡</div></div></div>'
    +'<div class="quem">Olá, '+esc(CTX?CTX.apelido:'')+' · controle</div></div>'
    +'<div class="controls">'+pills+painel+dt+'</div>';
}

// ── stats ─────────────────────────────────────────────────────────────────────
function statsHtml(){
  var p=0,a=0,au=0;
  state.rows.forEach(function(r){if(!r.presenca)au++;else if(!r.pontualidade)a++;else p++;});
  return '<div class="stats">'
    +'<div class="stat"><div class="n">'+p+'</div><div class="l">Presentes</div></div>'
    +'<div class="stat"><div class="n">'+a+'</div><div class="l">Atrasos</div></div>'
    +'<div class="stat"><div class="n">'+au+'</div><div class="l">Ausências</div></div>'
    +'</div>';
}

// ── lista ─────────────────────────────────────────────────────────────────────
function renderLista(){
  var el=$('lista');if(!el)return;
  if(!state.unit){el.innerHTML='<div class="hint">Escolha uma unidade acima.</div>';return;}
  el.innerHTML=state.rows.map(function(p,i){
    var justNeed=!(p.presenca&&p.pontualidade);
    var checks=COLS.map(function(c){
      return '<button class="chk'+(p[c[0]]?' on':'')+'" '
        +'onclick="tog(this.dataset.i,this.dataset.k)" '
        +'data-i="'+i+'" data-k="'+c[0]+'">'
        +(p[c[0]]?'✓ ':'')+c[1]+'</button>';
    }).join('');
    var tag=p.tipo==='Visita'
      ?'<span class="tag">HOJE</span><button class="rmv" onclick="rmv(this.dataset.i)" data-i="'+i+'">×</button>'
      :'';
    var just=justNeed
      ?'<input class="just" placeholder="Justificativa de falta/atraso (opcional)" '
        +'value="'+esc(p.justificativa||'')+'" '
        +'oninput="setJ(this.dataset.i,this.value)" data-i="'+i+'">'
      :'';
    return '<div class="card"><div class="card-top">'
      +'<div class="nome"><b>'+esc(p.nome)+'</b>'+tag+'</div>'
      +'<div class="checks">'+checks+'</div></div>'+just+'</div>';
  }).join('');
}

// ── render principal ──────────────────────────────────────────────────────────
function render(){
  if(!CTX||!CTX.ok){erroTela('Acesso inválido. Use o seu link pessoal.');return;}
  if(state.view==='painel'){renderPainel();return;}
  var banner='';
  if(state.unit&&LOGOS&&LOGOS[state.unit]){
    banner='<div style="display:flex;align-items:center;gap:12px;background:#141414;border:1px solid #222;'
      +'border-radius:14px;padding:12px 16px;margin-bottom:12px">'
      +'<img src="'+LOGOS[state.unit]+'" style="height:72px;flex-shrink:0;">'
      +'<div><div style="font-size:12px;color:#FFC400;font-weight:700;letter-spacing:1px">UNIDADE</div>'
      +'<div style="font-size:20px;font-weight:800">'+esc(state.unit)+'</div></div></div>';
  }
  var aviso=state.jaSalvo
    ?'<div class="aviso">⚠️ Controle já enviado hoje — reenviar irá substituir.</div>'
    :'';
  var html=header()+banner
    +'<div id="lista"></div>'
    +'<div class="addrow"><input id="vis" placeholder="Nome de visitante (some amanhã)">'
    +'<button class="addbtn" onclick="addVisita()">+ Visita</button></div>'
    +statsHtml()+aviso
    +'<button class="enviar" id="env" onclick="enviar()">Enviar ✓</button>'
    +'<div id="res"></div>';
  $('app').innerHTML=html;
  $('dt').addEventListener('change',function(e){state.date=e.target.value;loadRoster();});
  renderLista();
}

function refreshStats(){
  var old=document.querySelector('.stats');
  if(old){var tmp=document.createElement('div');tmp.innerHTML=statsHtml();old.parentNode.replaceChild(tmp.firstChild,old);}
}

// ── ações ─────────────────────────────────────────────────────────────────────
function pickUnit(u){state.unit=u;state.view='controle';loadRoster();}
function tog(i,k){state.rows[parseInt(i)][k]=!state.rows[parseInt(i)][k];renderLista();refreshStats();}
function setJ(i,v){state.rows[parseInt(i)].justificativa=v;}
function rmv(i){state.rows.splice(parseInt(i),1);renderLista();refreshStats();}
function addVisita(){
  var el=$('vis');var nome=(el.value||'').trim();if(!nome)return;
  state.rows.push({nome:nome+' (visita)',tipo:'Visita',presenca:false,pontualidade:false,biblia:false,camiseta:false,classe:false,justificativa:''});
  el.value='';renderLista();refreshStats();
}

// ── modal de confirmação ──────────────────────────────────────────────────────
function mostrarConfirm(titulo,msg,onOk){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
  var d=document.createElement('div');
  d.style.cssText='background:#141414;border:1px solid #FFC400;border-radius:16px;padding:24px;width:100%;max-width:360px;text-align:center';
  d.innerHTML='<div style="font-size:16px;font-weight:800;color:#FFC400;margin-bottom:8px">'+titulo+'</div>'
    +'<div style="font-size:14px;color:#ccc;margin-bottom:20px;line-height:1.5">'+msg+'</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button id="_cnc_" style="flex:1;background:#1c1c1c;color:#aaa;border:1px solid #333;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-size:14px">Cancelar</button>'
    +'<button id="_ok_" style="flex:1;background:#FFC400;color:#000;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-size:14px">Substituir</button>'
    +'</div>';
  ov.appendChild(d);document.body.appendChild(ov);
  document.getElementById('_cnc_').onclick=function(){document.body.removeChild(ov);};
  document.getElementById('_ok_').onclick=function(){document.body.removeChild(ov);onOk();};
}

// ── envio ─────────────────────────────────────────────────────────────────────
function enviar(){
  if(!state.unit){alert('Escolha uma unidade.');return;}
  if(state.jaSalvo){
    mostrarConfirm('⚠️ Controle já enviado hoje','Deseja substituir o controle enviado anteriormente?',function(){_doEnviar();});
    return;
  }
  _doEnviar();
}
function _doEnviar(){
  var env=$('env');env.disabled=true;env.textContent='Enviando…';
  callAPI('saveAttendance',{unit:state.unit,date:state.date,rows:state.rows},
    function(r){
      var wa='https://wa.me/?text='+encodeURIComponent(r.mensagem);
      var res=$('res');
      res.innerHTML='<div class="result"><h4>✓ Controle salvo! Mensagem pronta:</h4>'
        +'<div class="bolha">'+esc(r.mensagem).replace(/\*(.*?)\*/g,'<b>$1</b>')+'</div>'
        +'<div class="acoes"><a href="'+wa+'" target="_blank" rel="noopener">Enviar no WhatsApp</a></div>'
        +'</div>';
      state.jaSalvo=true;
      env.disabled=false;env.textContent='Enviar ✓';
      res.scrollIntoView({behavior:'smooth'});
    },
    function(e){alert('Erro ao salvar: '+(e.message||e));env.disabled=false;env.textContent='Enviar ✓';}
  );
}

// ── painel (admin) ────────────────────────────────────────────────────────────
function togglePainel(){
  state.view=state.view==='painel'?'controle':'painel';
  if(state.view==='painel')loadPainel();
  else{if(state.unit)loadRoster();else render();}
}
function loadPainel(){
  $('app').innerHTML=header()+'<div class="load">Calculando…</div>';
  $('dt').addEventListener('change',function(e){state.date=e.target.value;loadPainel();});
  callAPI('getPanel',{date:state.date},
    function(p){state._painel=p;renderPainel();},
    function(e){erroTela('Erro painel: '+(e.message||e));}
  );
}
function renderPainel(){
  var p=state._painel;var html=header();
  if(!p){$('app').innerHTML=html+'<div class="load">…</div>';$('dt').addEventListener('change',function(e){state.date=e.target.value;loadPainel();});return;}
  html+='<table class="ptable"><tr><th>Unidade</th><th>Pres.</th><th>Atr.</th><th>Aus.</th><th>Total</th></tr>';
  p.unidades.forEach(function(u){
    html+='<tr><td>'+u.emoji+' '+esc(u.unidade)+'</td><td>'+u.presentes+'</td><td>'+u.atrasos+'</td><td>'+u.ausencias+'</td><td>'+u.total+'</td></tr>';
  });
  html+='</table>';
  p.unidades.forEach(function(u){
    var wa='https://wa.me/?text='+encodeURIComponent(u.mensagem);
    html+='<div class="result"><div class="bolha">'+esc(u.mensagem).replace(/\*(.*?)\*/g,'<b>$1</b>')+'</div>'
      +'<div class="acoes"><a href="'+wa+'" target="_blank" rel="noopener">WhatsApp</a></div></div>';
  });
  $('app').innerHTML=html;
  $('dt').addEventListener('change',function(e){state.date=e.target.value;loadPainel();});
}

// ── carrega lista ─────────────────────────────────────────────────────────────
function loadRoster(){
  if(!state.unit){render();return;}
  $('app').innerHTML=header()+'<div class="load">Carregando lista…</div>';
  $('dt').addEventListener('change',function(e){state.date=e.target.value;loadRoster();});
  callAPI('getRoster',{unit:state.unit,date:state.date},
    function(r){state.rows=r.rows;state.jaSalvo=!!(r.jaSalvo);render();},
    function(e){erroTela('Erro ao carregar: '+(e.message||e));}
  );
}

// ── inicialização ─────────────────────────────────────────────────────────────
function startApp(){
  callAPI('getCtx',{},
    function(ctx){
      CTX=ctx; state.date=CTX.hoje||hoje();
      if(!CTX.ok){erroTela('Link inválido ou expirado.<br>Peça um novo link ao administrador.');return;}
      if(CTX.units.length===1){state.unit=CTX.units[0];loadRoster();}
      else{render();}
    },
    function(e){erroTela('Erro ao conectar: '+(e.message||e));}
  );
}
startApp();

</script>
</body>
